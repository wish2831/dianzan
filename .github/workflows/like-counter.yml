name: Like Counter

on:
  repository_dispatch:
    types: [like]

jobs:
  update-like-count:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      
      - name: Get current like count
        run: |
          # 获取当前点赞数
          LIKE_COUNT=$(curl -s -H "Authorization: token ${{ secrets.TOKEN }}" \
          "https://api.github.com/repos/${{ github.repository }}/issues/2" | jq -r '.body' | grep -oP 'count":\s*(\d+)' | cut -d ':' -f2 | tr -d ' ,')
          if [ -z "$LIKE_COUNT" ]; then
            LIKE_COUNT=0
          fi
          echo "LIKE_COUNT=$LIKE_COUNT" >> $GITHUB_ENV
      
      - name: Update like count
        run: |
          NEW_COUNT=$((LIKE_COUNT + 1))
          echo "```json" > issue_body.md
          echo "{\"count\": $NEW_COUNT}" >> issue_body.md
          echo "```" >> issue_body.md
          
          curl -X PATCH \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"body\": \"$(cat issue_body.md)\"}" \
            "https://api.github.com/repos/${{ github.repository }}/issues/2"
